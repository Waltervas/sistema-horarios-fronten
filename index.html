<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#B8952A;--gold-dark:#7A6018;--navy:#0D1B2A;--navy-mid:#1A2E44;--card-bg:var(--color-background-primary);--page-bg:var(--color-background-tertiary)}
body{font-family:var(--font-sans,'Segoe UI',sans-serif);background:var(--page-bg);color:var(--color-text-primary);min-height:100vh}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.lc{background:var(--card-bg);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:2.5rem;width:100%;max-width:400px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo-mark{width:42px;height:42px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark i{color:var(--gold);font-size:22px}
.logo-text strong{display:block;font-size:14px;font-weight:500}
.logo-text span{font-size:11px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.lc h2{font-size:18px;font-weight:500;margin-bottom:.25rem}
.lc .sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.75rem}
.fld{margin-bottom:1rem}
.fld label{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.fld input{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--card-bg);color:var(--color-text-primary);font-size:14px}
.fld input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,149,42,.15)}
.btn-login{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.btn-login:hover{background:var(--navy-mid)}
.err{background:var(--color-background-danger);border:0.5px solid var(--color-border-danger);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--color-text-danger);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.login-hint{margin-top:1.25rem;padding:.75rem 1rem;background:var(--color-background-secondary);border-radius:8px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.login-hint strong{color:var(--color-text-primary);font-weight:500}
.layout{display:flex;min-height:100vh}
.sidebar{width:224px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:1.25rem 1.25rem 1rem;border-bottom:0.5px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-lm{width:30px;height:30px;background:rgba(184,149,42,.15);border:0.5px solid rgba(184,149,42,.3);border-radius:6px;display:flex;align-items:center;justify-content:center}
.sb-lm i{color:var(--gold);font-size:16px}
.sb-lt{display:flex;flex-direction:column}
.sb-lt strong{font-size:12px;font-weight:500;color:#fff;line-height:1.3}
.sb-lt span{font-size:10px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
.sb-sec{padding:.75rem 0}
.sb-sec-lbl{padding:.5rem 1.25rem .25rem;font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1.25rem;font-size:13px;cursor:pointer;color:rgba(255,255,255,.55);transition:background .12s,color .12s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(184,149,42,.12);color:var(--gold);border-left-color:var(--gold)}
.nav-item i{font-size:15px;flex-shrink:0}
.sb-foot{margin-top:auto;padding:.875rem 1.25rem;border-top:0.5px solid rgba(255,255,255,.08)}
.uchip{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.uavatar{width:30px;height:30px;border-radius:50%;background:rgba(184,149,42,.18);border:0.5px solid rgba(184,149,42,.35);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--gold);flex-shrink:0}
.uinfo p{font-size:12px;font-weight:500;color:#fff}
.uinfo span{font-size:11px;color:rgba(255,255,255,.4)}
.btn-out{display:flex;align-items:center;gap:6px;width:100%;padding:7px 10px;background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.12);border-radius:8px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer}
.btn-out:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.main{flex:1;overflow-y:auto}
.ph{padding:1.25rem 2rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--card-bg);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.ph-left h1{font-size:17px;font-weight:500}
.ph-left p{font-size:12px;color:var(--color-text-secondary);margin-top:1px}
.pb{padding:1.5rem 2rem}
.card{background:var(--card-bg);border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:1.25rem;overflow:hidden}
.card-pad{padding:1.25rem}
.card-accent{border-top:2px solid var(--gold)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.ch h3{font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.stat-card{background:var(--card-bg);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:1rem 1.25rem;border-top:2px solid var(--gold)}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;background:rgba(184,149,42,.12);color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.stat-val{font-size:24px;font-weight:500;line-height:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--card-bg);color:var(--color-text-primary);font-weight:500}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}.btn-primary:hover{background:var(--navy-mid)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-gold:hover{background:var(--gold-dark);border-color:var(--gold-dark)}
.btn-r{background:none;color:var(--color-text-danger);border-color:var(--color-border-danger)}.btn-r:hover{background:var(--color-background-danger)}
.btn-b{background:none;color:#185FA5;border-color:rgba(24,95,165,.3)}.btn-b:hover{background:#E6F1FB}
.btn-o{background:none;color:#854F0B;border-color:rgba(133,79,11,.3)}.btn-o:hover{background:#FAEEDA}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}.btn-wa:hover{background:#1DA851}
.btn-sm{padding:5px 10px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
td{padding:9px 12px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row-normal:hover td{background:var(--color-background-secondary)}
tr.row-fest td{background:#FAEEDA !important}
tr.row-fest:hover td{background:#f5e0c0 !important}
tr.row-fest .day-label{color:#633806;font-weight:500}
tr.row-fest .fest-pill{display:inline-flex !important;align-items:center;gap:3px;padding:1px 7px;background:#F0C070;border-radius:999px;font-size:11px;color:#412402;font-weight:500;margin-left:5px}
tr.row-fest .dt-inp,tr.row-fest .ti-inp,tr.row-fest .est-sel{background:#F5E6C8 !important;border-color:#D4A654 !important}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500}
.ba{background:#EEEDFE;color:#3C3489}.br{background:#E1F5EE;color:#085041}.bs{background:#FAEEDA;color:#633806}.bc{background:#E6F1FB;color:#0C447C}
.bg-pend{background:#FAEEDA;color:#633806}.bg-proc{background:#E1F5EE;color:#085041}.bg-liq{background:#E6F1FB;color:#0C447C}
.badge-gold{background:rgba(184,149,42,.12);color:var(--gold-dark);border:0.5px solid rgba(184,149,42,.25)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em}
.ff input,.ff select{padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--card-bg);color:var(--color-text-primary);font-size:13px}
.ff input:focus,.ff select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,149,42,.12)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--card-bg);border:0.5px solid var(--color-border-secondary);border-radius:12px;width:100%;max-width:960px;max-height:92vh;overflow-y:auto}
.modal-head{padding:1.25rem 1.5rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
.modal-head-icon{width:32px;height:32px;background:rgba(13,27,42,.07);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-head-icon i{font-size:17px;color:var(--navy)}
.modal-head h3{font-size:15px;font-weight:500}
.modal-body{padding:1.25rem 1.5rem}
.mfoot{display:flex;gap:8px;justify-content:flex-end;padding:1rem 1.5rem;border-top:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;background:var(--color-background-secondary)}
.sc-table{overflow-x:auto}
.sc-table table{min-width:740px}
.ti-inp{width:82px;padding:5px 7px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:12px;background:var(--card-bg);color:var(--color-text-primary)}
.ti-inp:focus{outline:none;border-color:var(--gold)}
.ti-inp.inv{border-color:var(--color-text-danger)}
select.est-sel{padding:5px 7px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:12px;background:var(--card-bg);color:var(--color-text-primary)}
.dt-inp{padding:5px 7px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:12px;background:var(--card-bg);color:var(--color-text-primary)}
.table-actions-bar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);gap:.75rem;flex-wrap:wrap}
.btn-add-day{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:0.5px dashed rgba(184,149,42,.5);background:transparent;color:var(--gold-dark);font-weight:500}
.btn-add-day:hover{background:rgba(184,149,42,.08)}
.legend-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary);padding:.5rem 12px}
.legend-sw{width:14px;height:14px;border-radius:3px;background:#FAEEDA;border:0.5px solid #D4A654;flex-shrink:0}
.liq-section{background:var(--color-background-secondary);border-radius:8px;padding:1rem;margin-bottom:1rem}
.liq-section h4{font-size:12px;font-weight:500;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary)}
.liq-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.liq-row:last-child{border-bottom:none}
.liq-total{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1.25rem;background:var(--navy);border-radius:8px;font-size:14px;font-weight:500;color:#fff;margin-top:.75rem}
.liq-total span:last-child{color:var(--gold)}
.info-box{background:var(--color-background-secondary);border-left:2px solid var(--gold);border-radius:0 8px 8px 0;padding:.75rem 1rem;font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;line-height:1.6}
.filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end}
.filter-bar .ff{flex:1;min-width:130px}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 1.25rem}
.tab{padding:10px 14px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-weight:500;letter-spacing:.02em;transition:color .12s;text-transform:uppercase}
.tab:hover{color:var(--color-text-primary)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.casino-group{border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:1rem;overflow:hidden}
.casino-group-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--color-background-secondary);gap:.75rem;flex-wrap:wrap;border-left:3px solid var(--gold)}
.cg-title{display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px}
.cg-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.liq-persona-block{border:0.5px solid var(--color-border-tertiary);border-radius:8px;margin-bottom:.75rem;overflow:hidden}
.lpb-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:var(--color-background-secondary);font-size:13px;font-weight:500}
.lpb-body{padding:.75rem 1rem}
.lpb-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.lpb-row:last-child{border-bottom:none}
.liq-casino-total{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;background:var(--navy);border-radius:8px;font-size:15px;font-weight:500;color:#fff;margin-top:1rem}
.liq-casino-total span:last-child{color:var(--gold)}
.liq-sub-total{display:flex;justify-content:space-between;align-items:center;padding:.5rem .75rem;background:rgba(184,149,42,.08);border-radius:8px;font-size:13px;color:var(--gold-dark);margin-top:.5rem}
.changes-banner{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--color-background-secondary);border-left:2px solid var(--gold);border-radius:0 8px 8px 0;margin-bottom:1rem;font-size:13px;color:var(--color-text-secondary)}
.empty{text-align:center;padding:3rem;color:var(--color-text-secondary)}
.empty i{font-size:40px;margin-bottom:.75rem;display:block}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:999px;font-size:11px}
hr.div{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:1.5rem 0}
.signatures-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;padding:1.25rem;border-top:0.5px solid var(--color-border-tertiary)}
.sig-block{display:flex;flex-direction:column;gap:8px}
.sig-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-secondary)}
.sig-label i{font-size:14px;color:var(--gold)}
.sig-canvas-wrap{position:relative;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--color-background-secondary);overflow:hidden}
.sig-canvas-wrap canvas{display:block;cursor:crosshair;touch-action:none}
.sig-canvas-wrap.signed{border-color:rgba(184,149,42,.5);background:rgba(184,149,42,.04)}
.sig-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;pointer-events:none}
.sig-hint i{font-size:22px;color:var(--color-border-secondary)}
.sig-hint span{font-size:12px;color:var(--color-text-secondary)}
.sig-actions{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.sig-status{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)}
.sig-status.ok{color:#085041}
.sig-status.ok i{color:#1D9E75}
.sig-status.pending{color:#633806}
.btn-clear-sig{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary)}
.btn-clear-sig:hover{background:var(--color-background-secondary)}
.sig-remote-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:.875rem 1rem}
.sig-remote-box p{font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem;line-height:1.5}
.log-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.log-login{background:#E1F5EE;color:#085041}.log-logout{background:var(--color-background-secondary);color:var(--color-text-secondary)}.log-create{background:#E6F1FB;color:#0C447C}.log-edit{background:#FAEEDA;color:#633806}.log-delete{background:#FCEBEB;color:#7C1F1F}.log-sign{background:rgba(184,149,42,.12);color:var(--gold-dark)}.log-save{background:#EEEDFE;color:#3C3489}.log-row-add{background:#E1F5EE;color:#085041}.log-row-del{background:#FCEBEB;color:#7C1F1F}.log-row-edit{background:#FAEEDA;color:#633806}.log-estado{background:#E6F1FB;color:#0C447C}.log-liquidado{background:rgba(184,149,42,.12);color:var(--gold-dark)}.log-firma-admin{background:#EEEDFE;color:#3C3489}.log-firma-emp{background:#E1F5EE;color:#085041}.log-link{background:#E6F1FB;color:#0C447C}
.log-filter{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1.25rem}
.log-filter .ff{flex:1;min-width:120px}
.log-filter select,.log-filter input{padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:var(--card-bg);color:var(--color-text-primary);font-size:13px;width:100%}
.log-count{font-size:12px;color:var(--color-text-secondary)}
.q-selector{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;padding:.875rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.historial-mes{border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:1.25rem;overflow:hidden}
.hm-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--navy);cursor:pointer;gap:.75rem;flex-wrap:wrap}
.hm-header:hover{background:var(--navy-mid)}
.hm-title{display:flex;align-items:center;gap:10px;color:#fff;font-weight:500;font-size:14px}
.hm-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.q-group{border-top:0.5px solid var(--color-border-tertiary)}
.q-group-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;background:var(--color-background-secondary);gap:.75rem;flex-wrap:wrap;border-left:3px solid var(--gold)}
.q-group-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.q-group-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.periodo-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500}
.periodo-q1{background:#E1F5EE;color:#085041}
.periodo-q2{background:#E6F1FB;color:#0C447C}
.portal-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--page-bg)}
.portal-card{background:var(--card-bg);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:2rem;width:100%;max-width:600px}
.portal-head{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.portal-info{background:var(--color-background-secondary);border-radius:8px;padding:1rem;margin-bottom:1.25rem;font-size:13px}
.portal-info div{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.portal-info div:last-child{border-bottom:none}
.portal-info span:first-child{color:var(--color-text-secondary)}
.portal-info span:last-child{font-weight:500}

let TOKEN = localStorage.getItem('token') || '';

async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {})
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw await res.json();
  return res.json();
}
const FEST_FIJOS=['01-01','05-01','07-20','08-07','12-08','12-25'];
function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da)}
function addD(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}
function nextMon(d){const x=new Date(d),dow=x.getDay();if(dow===1)return x;x.setDate(x.getDate()+(dow===0?1:(8-dow)));return x}
function ymd(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function buildFest(y){const s=new Set();FEST_FIJOS.forEach(m=>s.add(`${y}-${m}`));const e=easter(y);[addD(e,-7),addD(e,-3),addD(e,-2),e].forEach(d=>s.add(ymd(d)));[new Date(y,0,6),new Date(y,2,19),addD(e,39),addD(e,60),addD(e,68),new Date(y,5,29),new Date(y,7,15),new Date(y,9,12),new Date(y,10,1),new Date(y,10,11)].forEach(d=>s.add(ymd(nextMon(d))));return s}
const FEST=new Set([...buildFest(2024),...buildFest(2025),...buildFest(2026),...buildFest(2027)]);
function isDomFest(f){if(!f)return false;return new Date(f+'T12:00:00').getDay()===0||FEST.has(f)}
function festLabel(f){if(!f)return'';const d=new Date(f+'T12:00:00').getDay()===0,fe=FEST.has(f);return d&&fe?'Dom · Festivo':d?'Domingo':fe?'Festivo':''}
const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SMMLV=1300000;
function getQuincena(f){if(!f)return null;const d=new Date(f+'T12:00:00');return{year:d.getFullYear(),month:d.getMonth(),q:d.getDate()<=15?1:2}}
function quincenaLabel(y,m,q){return`${q===1?'1ª':'2ª'} quincena — ${MESES[m]} ${y}`}
function quincenaKey(y,m,q){return`${y}-${String(m+1).padStart(2,'0')}-Q${q}`}
function quincenaPeriodo(y,m,q){const ini=q===1?`01/${String(m+1).padStart(2,'0')}/${y}`:`16/${String(m+1).padStart(2,'0')}/${y}`;const fin=q===1?`15/${String(m+1).padStart(2,'0')}/${y}`:`${new Date(y,m+1,0).getDate()}/${String(m+1).padStart(2,'0')}/${y}`;return`${ini} – ${fin}`}
function currentQ(){const n=new Date();return{year:n.getFullYear(),month:n.getMonth(),q:n.getDate()<=15?1:2}}
function genQOpts(){const res=[];const now=new Date();for(let m=0;m<7;m++){const d=new Date(now.getFullYear(),now.getMonth()-m,1);const y=d.getFullYear(),mo=d.getMonth();res.push({year:y,month:mo,q:2,key:quincenaKey(y,mo,2),label:quincenaLabel(y,mo,2),periodo:quincenaPeriodo(y,mo,2)});res.push({year:y,month:mo,q:1,key:quincenaKey(y,mo,1),label:quincenaLabel(y,mo,1),periodo:quincenaPeriodo(y,mo,1)})}return res}

async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value.trim();
  try {
    const data = await api('POST', '/auth/login', { usuario: u, password: p });
    TOKEN = data.token;
    localStorage.setItem('token', TOKEN);
    S.user = data;
    S.view = 'app';
    S.menu = data.rol === 'Casino' ? 'horarios' : 'dashboard';
    if (data.rol === 'Casino') {
      S.emp.eId = data.empresa_id;
      S.emp.cId = data.casino_id;
    }
    await cargarDatos();
    render();
  } catch {
    S.loginErr = 'Credenciales incorrectas';
    render();
  }
}

async function cargarDatos() {
  const [empresas, casinos, usuarios, horarios] = await Promise.all([
    api('GET', '/empresas'),
    api('GET', '/casinos'),
    S.user.rol === 'Administrador' ? api('GET', '/usuarios') : Promise.resolve([]),
    api('GET', '/horarios')
  ]);
  S.data.empresas  = empresas;
  S.data.casinos   = casinos.map(c => ({ ...c, eId: c.empresa_id }));
  S.data.usuarios  = usuarios;
  S.data.horarios  = horarios.map(h => ({
    ...h,
    empleado: {
      nombre: h.empleado_nombre,
      documento: h.empleado_documento,
      cargo: h.empleado_cargo,
      eId: h.empresa_id,
      cId: h.casino_id
    },
    quincena: {
      year: h.quincena_year,
      month: h.quincena_mes,
      q: h.quincena_q
    }
  }));
}

function renderRowsTable(rows,isEdit,showSave){
  const addId=isEdit?'edit-add-row':'add-row';

      <tbody>${rows.map((r,i)=>{
        const dn=r.fecha?DAYS[new Date(r.fecha+'T12:00:00').getDay()]:'-';
        const isH=r.estado==='Horario',fest=isDomFest(r.fecha),fl=festLabel(r.fecha);
        const hrs=isH&&r.entrada&&r.salida&&!r.entradaErr&&!r.salidaErr?calcHrs(r.entrada,r.salida):null;
        return`<tr class="${fest?'row-fest':'row-normal'}">
          <td><input class="dt-inp" type="date" data-r="${i}" data-f="fecha" data-edit="${isEdit?1:0}" value="${r.fecha||''}"></td>
          <td><span class="day-label">${dn}</span>${fest?`<span class="fest-pill"><i class="ti ti-sun" style="font-size:11px"></i>${fl}</span>`:''}</td>
          <td><select class="est-sel" data-r="${i}" data-f="estado" data-edit="${isEdit?1:0}">
            <option value="Horario" ${r.estado==='Horario'?'selected':''}>Horario</option>
            <option value="Compensatorio" ${r.estado==='Compensatorio'?'selected':''}>Compensatorio</option>
            <option value="Incapacidad" ${r.estado==='Incapacidad'?'selected':''}>Incapacidad</option>
            <option value="Vacaciones" ${r.estado==='Vacaciones'?'selected':''}>Vacaciones</option>
          </select></td>
          <td>${isH?`<input class="ti-inp${r.entradaErr?' inv':''}" type="text" maxlength="5" placeholder="00:00" data-r="${i}" data-f="entrada" data-edit="${isEdit?1:0}" value="${r.entrada||''}">`:'<span style="font-size:12px;color:var(--color-text-secondary)">—</span>'}</td>
          <td>${isH?`<input class="ti-inp${r.salidaErr?' inv':''}" type="text" maxlength="5" placeholder="00:00" data-r="${i}" data-f="salida" data-edit="${isEdit?1:0}" value="${r.salida||''}">`:'<span style="font-size:12px;color:var(--color-text-secondary)">—</span>'}</td>
          <td style="font-size:12px;color:var(--color-text-secondary)">${hrs!==null?hrs.toFixed(2)+'h':'—'}</td>
          <td>${isEdit?`<button class="btn btn-sm btn-r" data-edr="${i}"><i class="ti ti-trash"></i></button>`:`<button class="btn btn-sm btn-r" data-dr="${i}"><i class="ti ti-trash"></i></button>`}</td>
        </tr>`;}).join('')}
      </tbody></table>
      <div class="legend-row"><div class="legend-sw"></div><span>Domingo o festivo colombiano</span></div>
    </div>`;
  return`${rowsHtml}<div class="table-actions-bar">
    <button class="btn-add-day" id="${addId}"><i class="ti ti-calendar-plus"></i>Agregar día</button>
    ${saveBtn}

}

function rTabHistorial(){
  const{horarios,empresas,casinos}=S.data,f=S.histFiltro;
  const selE=f.eId?parseInt(f.eId):null,avCas=selE?casinos.filter(c=>c.eId===selE):casinos;

  if(selE)lista=lista.filter(h=>parseInt(h.empleado.eId)===selE);

  const byMes={};
  lista.forEach(h=>{if(!h.quincena)return;const{year,month,q}=h.quincena,mesKey=`${year}-${String(month+1).padStart(2,'0')}`,qk=quincenaKey(year,month,q);if(!byMes[mesKey])byMes[mesKey]={year,month,quincenas:{}};if(!byMes[mesKey].quincenas[qk])byMes[mesKey].quincenas[qk]={year,month,q,key:qk,horarios:[]};byMes[mesKey].quincenas[qk].horarios.push(h)});

    <div class="ch"><h3>Filtros de historial</h3></div>
    <div class="filter-bar">
      <div class="ff"><label>Empresa</label><select id="h-emp"><option value="">Todas</option>${empresas.map(e=>`<option value="${e.id}" ${selE===e.id?'selected':''}>${e.nombre}</option>`).join('')}</select></div>

          <span class="tag" style="color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)">${totalH.toFixed(1)}h</span>
          <span class="tag" style="color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)">${Object.keys(mes.quincenas).length} quincena${Object.keys(mes.quincenas).length!==1?'s':''}</span>

                const hT=h.rows.filter(r=>r.estado==='Horario'&&r.entrada&&r.salida&&!r.entradaErr&&!r.salidaErr).reduce((a,r)=>a+calcHrs(r.entrada,r.salida),0);
                return`<tr class="row-normal">

                  <td style="font-size:12px;color:var(--color-text-secondary)">${hT>0?hT.toFixed(1)+'h':'—'}</td>
                  <td>${sigStatus(h)}</td>

                  <td><div style="display:flex;gap:4px">
                    <button class="btn btn-sm btn-b" data-edit="${h.id}"><i class="ti ti-edit"></i></button>
                    <button class="btn btn-sm btn-o" data-liq="${h.id}"><i class="ti ti-calculator"></i></button>
                    <button class="btn btn-sm btn-wa" data-wa="${h.id}"><i class="ti ti-brand-whatsapp"></i></button>

function sigStatus(h){
  const a=!!h.sigAdmin,e=!!h.sigEmpleado;
  if(a&&e)return`<span style="font-size:11px;color:#085041"><i class="ti ti-writing-sign" style="color:#1D9E75;font-size:12px"></i> Completas</span>`;
  if(a)return`<span style="font-size:11px;color:var(--gold-dark)"><i class="ti ti-writing-sign" style="color:var(--gold);font-size:12px"></i> Admin</span>`;
  if(e)return`<span style="font-size:11px;color:#0C447C"><i class="ti ti-writing-sign" style="font-size:12px"></i> Empleado</span>`;
  return`<span style="font-size:11px;color:var(--color-text-secondary)">Sin firmas</span>`;
}

/* ── CÁLCULOS ── */
function calcHrs(ent,sal){const[eh,em]=ent.split(':').map(Number),[sh,sm]=sal.split(':').map(Number);let m=(sh*60+sm)-(eh*60+em);if(m<0)m+=1440;return m/60}
function getMin(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function clasificar(fecha,entrada,salida){
  const esDomFest=new Date(fecha+'T12:00:00').getDay()===0||FEST.has(fecha);
  let minEnt=getMin(entrada),minSal=getMin(salida);if(minSal<=minEnt)minSal+=1440;
  let hOrd=0,hExtra=0,hNoctOrd=0,hNoctExtra=0,hDomFest=0,hDomFestExtra=0,hNoctDom=0;
  for(let m=minEnt;m<minSal;m++){const minR=m%1440,hM=Math.floor(minR/60),esNoct=hM>=21||hM<6,esExtra=(m-minEnt)/60>=8;
    if(esDomFest){if(esNoct)hNoctDom+=1/60;else if(esExtra)hDomFestExtra+=1/60;else hDomFest+=1/60}
    else{if(esNoct){if(esExtra)hNoctExtra+=1/60;else hNoctOrd+=1/60}else{if(esExtra)hExtra+=1/60;else hOrd+=1/60}}}
  return{hOrd,hExtra,hNoctOrd,hNoctExtra,hDomFest,hDomFestExtra,hNoctDom};
}
function liquidarUno(h){
  const vH=SMMLV/240,rows=h.rows.filter(r=>r.estado==='Horario'&&r.fecha&&r.entrada&&r.salida&&!r.entradaErr&&!r.salidaErr);
  let tot={hOrd:0,hExtra:0,hNoctOrd:0,hNoctExtra:0,hDomFest:0,hDomFestExtra:0,hNoctDom:0};
  rows.forEach(r=>{const c=clasificar(r.fecha,r.entrada,r.salida);Object.keys(tot).forEach(k=>tot[k]+=c[k])});
  const REC={hOrd:{r:0,l:'Hora ordinaria'},hExtra:{r:.25,l:'Extra diurna'},hNoctOrd:{r:.35,l:'Recargo nocturno'},hNoctExtra:{r:.75,l:'Extra nocturna'},hDomFest:{r:.75,l:'Dom/festivo'},hDomFestExtra:{r:1.0,l:'Extra dom/fest'},hNoctDom:{r:1.1,l:'Nocturna dom/fest'}};
  let total=0;
  const desglose=Object.keys(tot).map(k=>{const hh=tot[k],{r,l}=REC[k],val=hh*vH*(1+r);total+=val;return{k,l,h:hh,r,val}}).filter(x=>x.h>0.01);
  const vacD=h.rows.filter(r=>r.estado==='Vacaciones').length,cmpD=h.rows.filter(r=>r.estado==='Compensatorio').length,incD=h.rows.filter(r=>r.estado==='Incapacidad').length;
  const vacV=vacD*(SMMLV/30),cmpV=cmpD*(SMMLV/30),incV=incD*(SMMLV/30)*0.667;
  total+=vacV+cmpV+incV;return{desglose,vacD,cmpD,incD,vacV,cmpV,incV,total,vH};
}

function bPortal(hId){
  const canvas=document.getElementById('sig-canvas-portal');if(!canvas)return;
  const wrap=document.getElementById('sig-wrap-portal'),hint=document.getElementById('sig-hint-portal'),statusEl=document.getElementById('portal-sig-status');
  canvas.width=canvas.offsetWidth||480;canvas.height=130;
  const ctx=canvas.getContext('2d');ctx.strokeStyle='#0D1B2A';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false,lx=0,ly=0,hasSig=false;
  function gp(e){const r=canvas.getBoundingClientRect();if(e.touches)return{x:(e.touches[0].clientX-r.left)*(canvas.width/r.width),y:(e.touches[0].clientY-r.top)*(canvas.height/r.height)};return{x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)}}
  function start(e){e.preventDefault();drawing=true;const p=gp(e);lx=p.x;ly=p.y;if(hint)hint.style.opacity='0'}
  function move(e){e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;hasSig=true}
  function end(e){e.preventDefault();drawing=false;if(hasSig){wrap.classList.add('signed');if(statusEl){statusEl.className='sig-status ok';statusEl.innerHTML='<i class="ti ti-circle-check"></i>Firma lista'}}}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
  document.getElementById('portal-clear-sig')?.addEventListener('click',()=>{ctx.clearRect(0,0,canvas.width,canvas.height);hasSig=false;wrap.classList.remove('signed');if(hint)hint.style.opacity='1';if(statusEl){statusEl.className='sig-status';statusEl.innerHTML='<i class="ti ti-circle-dashed"></i>Sin firma'}});
  document.getElementById('portal-submit-btn')?.addEventListener('click',()=>{
    if(!hasSig){alert('Por favor firma antes de confirmar.');return}
    const sigData=canvas.toDataURL();const h=getH(hId);
    if(h){h.sigEmpleado=sigData;addLog('firma-emp',`Firma recibida — horario #${hId}`,`Empleado: ${h.empleado.nombre}${h.quincena?' · '+quincenaLabel(h.quincena.year,h.quincena.month,h.quincena.q):''}`,  'empleado-portal')}
    window.location.hash='';
    document.getElementById('app').innerHTML=`<div class="portal-wrap"><div class="portal-card">
      <div class="portal-head"><div class="logo-mark"><i class="ti ti-diamond"></i></div><div><strong style="font-size:14px">Sistema de Horarios</strong></div></div>
      <div class="portal-done"><i class="ti ti-circle-check"></i><h3>¡Firma registrada!</h3><p>Tu firma fue guardada exitosamente. Puedes cerrar esta ventana.</p></div>
    </div></div>`;
  });
}

  ctx.strokeStyle='#0D1B2A';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  let drawing=false,lx=0,ly=0;
  function gp(e){const r=canvas.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top}}
  function start(e){e.preventDefault();drawing=true;const p=gp(e);lx=p.x;ly=p.y;if(hint)hint.style.opacity='0'}
  function move(e){e.preventDefault();if(!drawing)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y}
  function end(e){e.preventDefault();if(!drawing)return;drawing=false;SIG.admin=canvas.toDataURL();wrap?.classList.add('signed');addLog('firma-admin','Firma del administrador registrada',`Casino: ${getCasNombre(S.emp.cId)}`);
    const act=document.getElementById('sig-act-admin');if(act){act.innerHTML=`<div class="sig-status ok"><i class="ti ti-circle-check"></i>Firma registrada</div><button class="btn-clear-sig" data-clear-sig="admin"><i class="ti ti-trash" style="font-size:11px"></i>Limpiar</button>`;
    act.querySelector('[data-clear-sig]').addEventListener('click',()=>{ctx.clearRect(0,0,canvas.width,canvas.height);SIG.admin=null;wrap?.classList.remove('signed');if(hint)hint.style.opacity='1';act.innerHTML=`<div class="sig-status"><i class="ti ti-circle-dashed"></i>Sin firma</div>`})}}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
}

/* ── GUARDAR / EDITAR ── */
function commitEdit(){
  const h=S.editHorario,orig=getH(h.id);let ok=true;
  h.rows.forEach((r,i)=>{if(r.estado==='Horario'){h.rows[i].entradaErr=!valTime(r.entrada)||!r.entrada;h.rows[i].salidaErr=!valTime(r.salida)||!r.salida;if(h.rows[i].entradaErr||h.rows[i].salidaErr)ok=false}});
  if(!ok){render();return false}
  if(orig){
    const emp=h.empleado,oemp=orig.empleado;
    if(emp.nombre!==oemp.nombre)addLog('edit',`Horario #${h.id}: nombre cambiado`,`"${oemp.nombre}" → "${emp.nombre}"`);
    if(emp.cargo!==oemp.cargo)addLog('edit',`Horario #${h.id}: cargo cambiado`,`"${oemp.cargo||'—'}" → "${emp.cargo||'—'}"`);
    if(emp.cId!==oemp.cId)addLog('edit',`Horario #${h.id}: casino cambiado`,`"${getCasNombre(oemp.cId)}" → "${getCasNombre(emp.cId)}"`);
    const rowsDiff=h.rows.length-orig.rows.length;
    if(rowsDiff>0)addLog('row-add',`Horario #${h.id}: ${rowsDiff} día${rowsDiff!==1?'s':''} agregado${rowsDiff!==1?'s':''}`,`Empleado: ${emp.nombre}`);
    if(rowsDiff<0)addLog('row-del',`Horario #${h.id}: ${Math.abs(rowsDiff)} día${Math.abs(rowsDiff)!==1?'s':''} eliminado${Math.abs(rowsDiff)!==1?'s':''}`,`Empleado: ${emp.nombre}`);
    orig.rows.forEach((or,i)=>{const nr=h.rows[i];if(!nr)return;if(nr.fecha!==or.fecha||nr.entrada!==or.entrada||nr.salida!==or.salida||nr.estado!==or.estado)addLog('row-edit',`Horario #${h.id}: fila ${i+1} modificada`,`${nr.fecha||'—'} · ${nr.estado}${nr.estado==='Horario'?` ${nr.entrada||'?'}–${nr.salida||'?'}`:''}`)});
    if(JSON.stringify(h.rows)!==JSON.stringify(orig.rows)||JSON.stringify(h.empleado)!==JSON.stringify(orig.empleado))addLog('edit',`Horario #${h.id} guardado con cambios`,`Empleado: ${emp.nombre}${h.quincena?' · '+quincenaLabel(h.quincena.year,h.quincena.month,h.quincena.q):''}`);
  }
  const idx=S.data.horarios.findIndex(x=>x.id===h.id);
  if(idx>-1){S.data.horarios[idx]=JSON.parse(JSON.stringify(h));S.data.horarios[idx].estado='Procesado'}
  S.editHorario=null;return true;
}
function valTime(v){if(!v)return true;const m=v.match(/^(\d{1,2}):(\d{2})$/);if(!m)return false;return+m[1]<=23&&+m[2]<=59}
function saveSchedule(){
  let ok=true;
  S.rows.forEach((r,i)=>{if(r.estado==='Horario'){S.rows[i].entradaErr=!valTime(r.entrada)||!r.entrada;S.rows[i].salidaErr=!valTime(r.salida)||!r.salida;if(S.rows[i].entradaErr||S.rows[i].salidaErr)ok=false}});
  if(!ok){render();return}
  const e=S.emp;if(!e.nombre||!e.cId){alert('Completa nombre y casino del empleado');return}
  const q=S.selQ;
  const newH={id:gid(),empleado:{...e},rows:JSON.parse(JSON.stringify(S.rows)),estado:'Pendiente',fechaGuardado:new Date().toISOString(),sigAdmin:SIG.admin||null,sigEmpleado:null,quincena:{...q},quincenaKey:quincenaKey(q.year,q.month,q.q)};
  S.data.horarios.push(newH);
  addLog('save',`Horario creado — empleado: ${e.nombre}`,`Casino: ${getCasNombre(e.cId)} · ${quincenaLabel(q.year,q.month,q.q)} · ${S.rows.length} días${SIG.admin?' · Con firma admin':''}`);
  S.rows=[];S.emp={nombre:'',documento:'',cargo:'',cId:S.user.cId||'',eId:S.user.eId||''};SIG.admin=null;
  S.modal='firma-link';S.mdata={hId:newH.id};render();
}

/* ── BIND ── */
function bApp(){
  window.onhashchange=()=>render();

  document.getElementById('ne-btn')?.addEventListener('click',()=>{S.modal='new-empresa';render()});

  document.querySelectorAll('[data-dc]').forEach(el=>el.addEventListener('click',()=>{const id=parseInt(el.dataset.dc),c=S.data.casinos.find(x=>x.id===id);addLog('delete',`Casino eliminado: ${c?.nombre||id}`);S.data.casinos=S.data.casinos.filter(x=>x.id!==id);render()}));
  document.getElementById('nu-btn')?.addEventListener('click',()=>{S.modal='new-usuario';render()});
  document.querySelectorAll('[data-du]').forEach(el=>el.addEventListener('click',()=>{const id=parseInt(el.dataset.du);if(id===S.user.id)return;const u=S.data.usuarios.find(x=>x.id===id);addLog('delete',`Usuario eliminado: ${u?.usuario||id}`);S.data.usuarios=S.data.usuarios.filter(x=>x.id!==id);render()}));
  document.getElementById('q-sel-form')?.addEventListener('change',e=>{const key=e.target.value,opt=genQOpts().find(o=>o.key===key);if(opt)S.selQ={year:opt.year,month:opt.month,q:opt.q};render()});
  document.getElementById('add-row')?.addEventListener('click',()=>{S.rows.push({fecha:'',estado:'Horario',entrada:'',salida:'',entradaErr:false,salidaErr:false});render()});
  document.getElementById('save-sch')?.addEventListener('click',saveSchedule);
  document.getElementById('edit-add-row')?.addEventListener('click',()=>{S.editHorario.rows.push({fecha:'',estado:'Horario',entrada:'',salida:'',entradaErr:false,salidaErr:false});addLog('row-add',`Horario #${S.editHorario.id}: nueva fila`,`Empleado: ${S.editHorario.empleado.nombre}`);render()});
  document.querySelectorAll('[data-dr]').forEach(el=>el.addEventListener('click',()=>{S.rows.splice(parseInt(el.dataset.dr),1);render()}));
  document.querySelectorAll('[data-edr]').forEach(el=>el.addEventListener('click',()=>{const i=parseInt(el.dataset.edr),r=S.editHorario.rows[i];addLog('row-del',`Horario #${S.editHorario.id}: fila ${i+1} eliminada`,`${r?.fecha||'—'} · ${r?.estado||'?'}`);S.editHorario.rows.splice(i,1);render()}));
  bindRowInputs();
  document.getElementById('en')?.addEventListener('input',e=>{if(S.modal==='edit-horario'&&S.editHorario)S.editHorario.empleado.nombre=e.target.value;else S.emp.nombre=e.target.value});
  document.getElementById('ed')?.addEventListener('input',e=>{if(S.modal==='edit-horario'&&S.editHorario)S.editHorario.empleado.documento=e.target.value;else S.emp.documento=e.target.value});
  document.getElementById('ec')?.addEventListener('input',e=>{if(S.modal==='edit-horario'&&S.editHorario)S.editHorario.empleado.cargo=e.target.value;else S.emp.cargo=e.target.value});
  document.getElementById('ee')?.addEventListener('change',e=>{if(S.modal==='edit-horario'&&S.editHorario){S.editHorario.empleado.eId=e.target.value;S.editHorario.empleado.cId='';render()}else{S.emp.eId=e.target.value;S.emp.cId='';render()}});
  document.getElementById('eca')?.addEventListener('change',e=>{if(S.modal==='edit-horario'&&S.editHorario)S.editHorario.empleado.cId=e.target.value;else S.emp.cId=e.target.value});
  document.getElementById('f-emp')?.addEventListener('change',e=>{S.rrhhFiltro.eId=e.target.value;S.rrhhFiltro.cId='';render()});
  document.getElementById('f-cas')?.addEventListener('change',e=>{S.rrhhFiltro.cId=e.target.value;render()});
  document.getElementById('f-q')?.addEventListener('change',e=>{S.rrhhFiltro.qKey=e.target.value;render()});
  document.getElementById('f-txt')?.addEventListener('input',e=>{S.rrhhFiltro.texto=e.target.value;render()});
  document.getElementById('h-emp')?.addEventListener('change',e=>{S.histFiltro.eId=e.target.value;S.histFiltro.cId='';render()});
  document.getElementById('h-cas')?.addEventListener('change',e=>{S.histFiltro.cId=e.target.value;render()});
  document.querySelectorAll('[data-expand-mes]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.expandMes;S.histFiltro.expandedMes=S.histFiltro.expandedMes===k?null:k;render()}));
  document.querySelectorAll('[data-expand-q]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const k=el.dataset.expandQ;S.histFiltro.expandedQ=S.histFiltro.expandedQ===k?null:k;render()}));
  document.querySelectorAll('[data-liq-q]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.modal='liq-quincena';S.mdata={qKey:el.dataset.liqQ};render()}));
  document.querySelectorAll('[data-edit]').forEach(el=>el.addEventListener('click',()=>{const h=getH(parseInt(el.dataset.edit));if(!h)return;S.editHorario=JSON.parse(JSON.stringify(h));S.modal='edit-horario';addLog('edit',`Horario #${h.id} abierto para edición`,`Empleado: ${h.empleado.nombre}${h.quincena?' · '+quincenaLabel(h.quincena.year,h.quincena.month,h.quincena.q):''}`);render()}));
  document.querySelectorAll('[data-liq]').forEach(el=>el.addEventListener('click',()=>{S.liqId=parseInt(el.dataset.liq);S.modal='liquidar-persona';render()}));
  document.querySelectorAll('[data-dh]').forEach(el=>el.addEventListener('click',()=>{const id=parseInt(el.dataset.dh),h=getH(id);addLog('delete',`Horario #${id} eliminado`,`Empleado: ${h?.empleado?.nombre||'?'}${h?.quincena?' · '+quincenaLabel(h.quincena.year,h.quincena.month,h.quincena.q):''}`);S.data.horarios=S.data.horarios.filter(x=>x.id!==id);render()}));
  document.querySelectorAll('[data-wa]').forEach(el=>el.addEventListener('click',()=>{S.modal='firma-link';S.mdata={hId:parseInt(el.dataset.wa)};render()}));
  document.getElementById('lf-tipo')?.addEventListener('change',e=>{S.logFiltro.tipo=e.target.value;render()});
  document.getElementById('lf-user')?.addEventListener('input',e=>{S.logFiltro.usuario=e.target.value;render()});
  document.getElementById('lf-txt')?.addEventListener('input',e=>{S.logFiltro.texto=e.target.value;render()});
  document.getElementById('clear-logs-btn')?.addEventListener('click',()=>{if(confirm('¿Limpiar todos los logs?')){S.data.logs=[];render()}});
  document.getElementById('mbg')?.addEventListener('click',e=>{if(e.target.id==='mbg'){S.modal=null;render()}});
  document.getElementById('mc')?.addEventListener('click',()=>{S.modal=null;render()});
  document.getElementById('memp')?.addEventListener('change',()=>{const eId=document.getElementById('memp')?.value,sel=document.getElementById('mcas');if(!sel)return;const avC=eId?S.data.casinos.filter(c=>c.eId===parseInt(eId)):[];sel.innerHTML='<option value="">Sin casino</option>'+avC.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')});
  document.getElementById('ms')?.addEventListener('click',handleSave);
  document.getElementById('ms-edit-liq')?.addEventListener('click',()=>{const idP=S.editHorario?.id;if(!idP)return;if(!commitEdit())return;S.liqId=idP;S.modal='liquidar-persona';render()});
  document.getElementById('ms-liq')?.addEventListener('click',()=>{const h=getH(S.liqId);if(h){h.estado='Liquidado';addLog('liquidado',`Horario #${h.id} liquidado`,`Empleado: ${h.empleado.nombre}${h.quincena?' · '+quincenaLabel(h.quincena.year,h.quincena.month,h.quincena.q):''}`)}S.modal=null;render()});

function bindRowInputs(){
  document.querySelectorAll('[data-r][data-f]').forEach(el=>{
    const isEdit=el.dataset.edit==='1',arr=()=>isEdit&&S.editHorario?S.editHorario.rows:S.rows;
    el.addEventListener('change',()=>{
      const i=parseInt(el.dataset.r),f=el.dataset.f,rows=arr();if(!rows[i])return;
      const prev={...rows[i]};
      if(f==='estado'){rows[i][f]=el.value;if(isEdit)addLog('estado',`Horario #${S.editHorario?.id}: estado fila ${i+1}`,`${prev.estado} → ${el.value}`);render();return}
      if(f==='fecha'){rows[i][f]=el.value;if(isEdit&&el.value)addLog('row-edit',`Horario #${S.editHorario?.id}: fecha fila ${i+1}`,`${prev.fecha||'—'} → ${el.value}`);render();return}
      const v=el.value.replace(/[^0-9:]/g,'');rows[i][f]=v;rows[i][f+'Err']=!valTime(v);
      if(isEdit&&v&&!rows[i][f+'Err'])addLog('row-edit',`Horario #${S.editHorario?.id}: hora ${f} fila ${i+1}`,`${prev[f]||'—'} → ${v}`);
      render();
    });
    if(el.classList.contains('ti-inp')){el.addEventListener('input',()=>{let v=el.value.replace(/[^0-9]/g,'');if(v.length>4)v=v.slice(0,4);if(v.length>2)v=v.slice(0,2)+':'+v.slice(2);el.value=v})}
  });
}
function handleSave(){
  if(S.modal==='new-empresa'){const n=document.getElementById('mn').value.trim();if(!n)return;S.data.empresas.push({id:gid(),nombre:n});addLog('create',`Empresa creada: ${n}`)}
  else if(S.modal==='add-casino'){const n=document.getElementById('mn').value.trim();if(!n)return;const emp=S.data.empresas.find(e=>e.id===S.mdata.eId);S.data.casinos.push({id:gid(),eId:S.mdata.eId,nombre:n});addLog('create',`Casino creado: ${n}`,`Empresa: ${emp?.nombre||'?'}`)}
  else if(S.modal==='new-usuario'){
    const u=document.getElementById('mu').value.trim(),pw=document.getElementById('mpw').value.trim(),rol=document.getElementById('mrol').value;
    const eId=document.getElementById('memp').value?parseInt(document.getElementById('memp').value):null;
    const cId=document.getElementById('mcas').value?parseInt(document.getElementById('mcas').value):null;
    if(!u||!pw)return;S.data.usuarios.push({id:gid(),usuario:u,password:pw,rol,eId,cId});addLog('create',`Usuario creado: ${u}`,`Rol: ${rol}`);
  }else if(S.modal==='edit-horario'){if(!commitEdit())return}
  S.modal=null;S.mdata={};render();
}
window.addEventListener('hashchange',()=>render());
render();
